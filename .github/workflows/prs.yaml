name: prs
on:
  pull_request:
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  checks:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
      - name: Check Permissions
        run: |
          # Executable bit indices
          USER_EXEC_IND=3
          GROUP_EXEC_IND=6
          ELSE_EXEC_IND=9

          for FILE in tools/*; do
            PERMISSIONS=$(stat -c "%A" "${FILE}")
            for IND in "${USER_EXEC_IND}" "${GROUP_EXEC_IND}" "${ELSE_EXEC_IND}"; do
              EXEC_PERM="${PERMISSIONS:$IND:1}"
              if [ "${EXEC_PERM}" != "x" ]; then
                ls -l tools/
                echo ""
                echo "${FILE} does not have the correct permissions."
                echo "Ensure all tools are executable by everyone and try again."
                exit 1
              fi
            done
          done
      - name: Run pytest
        run: |
          pip install pytest
          pytest tests
